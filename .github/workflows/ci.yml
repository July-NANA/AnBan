name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Python and web baseline
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create Miniforge environment
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
        with:
          miniforge-version: latest
          activate-environment: anban
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify and install locked Python dependencies
        run: |
          uv lock --check
          uv export --frozen --all-groups --no-emit-project --format requirements-txt --output-file "$RUNNER_TEMP/requirements.txt"
          uv pip install --python "$CONDA_PREFIX/bin/python" -r "$RUNNER_TEMP/requirements.txt"

      - name: Install locked web dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Python and frontend
        run: pnpm check

      - name: Build frontend
        run: pnpm build

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan committed history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
