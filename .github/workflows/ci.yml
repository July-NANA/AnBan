name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Python and web baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up standard Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify and install locked Python dependencies
        run: |
          python -m pip install uv==0.11.29
          uv lock --check
          uv export --frozen --all-groups --no-emit-project --format requirements-txt --output-file "$RUNNER_TEMP/requirements.txt"
          python -m pip install -r "$RUNNER_TEMP/requirements.txt"
          python -m pip install --no-deps -e .

      - name: Install locked web dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Python and frontend
        run: pnpm check

      - name: Build frontend
        run: pnpm build

      - name: Check current-environment Doctor and CLI
        run: |
          python -m scripts.doctor --toolchain-only
          python -m anban.cli --help

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan committed history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
